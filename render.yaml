services:
  - type: web
    name: typeworld
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT typeworld.asgi:application
    envVars:
      - key: TYPEWORLD_DEBUG
        value: 0
      - key: TYPEWORLD_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: TYPEWORLD_ALLOWED_HOSTS
        sync: false
      - key: TYPEWORLD_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: TYPEWORLD_PUBLIC_URL
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: VK_CLIENT_ID
        sync: false
      - key: VK_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: typeworld-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: typeworld-redis
          property: connectionString
  - type: redis
    name: typeworld-redis
    plan: free
    ipAllowList: []

databases:
  - name: typeworld-db
    plan: free
