{% extends 'races/base.html' %}
{% block content %}
<section class="game-page card" data-game="sprint">
  <div class="game-head">
    <div>
      <p class="eyebrow">Спринт</p>
      <h1>30 секунд скорости</h1>
    </div>
    <a class="btn" href="{% url 'games' %}">Все игры</a>
  </div>

  <div class="game-stats">
    <span>Время: <b id="timeLeft">30</b>с</span>
    <span>Счёт: <b id="score">0</b></span>
    <span>Ошибки: <b id="mistakes">0</b></span>
  </div>

  <div id="sprintWords" class="sprint-words"></div>
  <input id="sprintInput" class="game-input" autocomplete="off" placeholder="Нажми «Начать» и печатай слово...">

  <div class="actions">
    <button id="startSprint" class="btn primary">Начать</button>
    <button id="restartSprint" class="btn">Заново</button>
  </div>

  <div id="sprintResult" class="game-result"></div>
</section>
<script src="/static/races/js/games.js"></script>
{% endblock %}
