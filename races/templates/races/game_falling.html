{% extends 'races/base.html' %}
{% block content %}
<section class="game-page card" data-game="falling">
  <div class="game-head">
    <div>
      <p class="eyebrow">Падающие слова</p>
      <h1>Не дай словам упасть</h1>
    </div>
    <a class="btn" href="{% url 'games' %}">Все игры</a>
  </div>

  <div class="game-stats">
    <span>Счёт: <b id="fallScore">0</b></span>
    <span>Жизни: <b id="lives">3</b></span>
    <span>Скорость: <b id="level">1</b></span>
  </div>

  <div id="fallingArena" class="falling-arena"></div>
  <input id="fallingInput" class="game-input" autocomplete="off" placeholder="Вводи падающее слово...">

  <div class="actions">
    <button id="startFalling" class="btn primary">Начать</button>
    <button id="restartFalling" class="btn">Заново</button>
  </div>

  <div id="fallingResult" class="game-result"></div>
</section>
<script src="/static/races/js/games.js"></script>
{% endblock %}
